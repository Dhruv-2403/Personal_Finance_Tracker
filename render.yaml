services:
  - type: web
    name: personal-finance-tracker
    runtime: node
    plan: free
    buildCommand: npm install --prefix backend && npx --prefix backend prisma generate
    startCommand: node backend/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
